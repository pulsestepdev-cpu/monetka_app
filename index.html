<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sladenkaya Coin Pro</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js?v=final111"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* Блокируем системное выделение текста для всего приложения */
        * {
            -webkit-touch-callout: none; /* iOS Safari */
            -user-select: none;          /* Standard syntax */
            -webkit-tap-highlight-color: transparent; /* Убираем синий квадрат при клике */
        }
    </style>
</head>
<body>

    <div class="bg-hearts"></div>

    <div class="coin-container">
        <div id="coin" class="coin">
            <div class="side front">
                <img src="assets/yes.png" alt="Да">
            </div>
            <div class="side back">
                <img src="assets/no.png" alt="Нет">
            </div>
        </div>
    </div>

    <button id="flipBtn" class="btn-flip">Погнали, сладенькая</button>

    <audio id="soundYes" src="assets/yes.mp3" preload="auto"></audio>
    <audio id="soundNo" src="assets/no.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
