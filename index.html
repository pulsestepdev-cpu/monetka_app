<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sladenkaya Coin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-pink: #ff007f;
            --gold: #d4af37;
        }

        body {
            background: radial-gradient(circle at center, #2b061a 0%, #050505 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Comfortaa', cursive;
            color: white;
            overflow: hidden;
        }

        /* Декоративные сердечки на фоне */
        .bg-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.2;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>');
            background-size: 100px;
        }

        .coin-container {
            perspective: 1000px;
            z-index: 2;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.3));
        }

        .coin {
            width: 280px;
            height: 280px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1);
        }

        .side {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 50%;
        }

        .side img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .back {
            transform: rotateY(180deg);
        }

        .btn-flip {
            margin-top: 50px;
            padding: 18px 45px;
            font-size: 20px;
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(45deg, var(--main-pink), #b00058);
            border: none;
            border-radius: 50px;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
            cursor: pointer;
            z-index: 2;
            transition: transform 0.2s;
        }

        .btn-flip:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="bg-hearts"></div>

    <div class="coin-container">
        <div id="coin" class="coin">
            <div class="side front">
                <img src="yes.png" alt="Да">
            </div>
            <div class="side back">
                <img src="no.png" alt="Нет">
            </div>
        </div>
    </div>

    <button class="btn-flip" onclick="flipCoin()">Погнали, сладенькая</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentRotation = 0;
        let isSpinning = false;

        function flipCoin() {
            if (isSpinning) return;
            isSpinning = true;

            const coin = document.getElementById('coin');
            
            // Случайный выбор: 0 или 180 градусов
            const isYes = Math.random() < 0.5;
            const extraDegrees = isYes ? 0 : 180; 
            
            // Минимум 5 полных оборотов (1800 градусов) + результат
            const spins = (Math.floor(Math.random() * 5) + 5) * 360;
            currentRotation += spins + extraDegrees;

            coin.style.transform = `rotateY(${currentRotation}deg)`;

            // Вибрация
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }

            setTimeout(() => {
                isSpinning = false;
            }, 3000);
        }
    </script>
</body>
</html>
